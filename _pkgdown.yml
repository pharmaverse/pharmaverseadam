url: https://pharmaverse.github.io/pharmaverseadam

template:
  bootstrap: 5
  light-switch: true
  params:
    bootswatch: flatly
  includes:
    css: pkgdown/extra.css
    in_header: |
      <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Select all navbar links that have an aria-label
        var navLinks = document.querySelectorAll('.navbar-nav .nav-link[aria-label]');

        navLinks.forEach(function (link) {
          // Initialize Bootstrap 5 Tooltip
          link.setAttribute('title', link.getAttribute('aria-label'));
          new bootstrap.Tooltip(link, {
            placement: 'bottom', // Tooltip appears below the icon
            trigger: 'hover'
          });
        });
      });
      </script>
repo:
  url:
    home: https://github.com/pharmaverse/pharmaverseadam
    source: https://github.com/pharmaverse/pharmaverseadam/blob/main/
    issue: https://github.com/pharmaverse/pharmaverseadam/issues/
    user: https://github.com/
news:
  cran_dates: true

development:
  mode: auto

authors:
  footer:
    roles: [aut, cre]
    text: "Developed by Cytel Inc., F. Hoffmann-La Roche AG, GlaxoSmithKline LLC, "
  sidebar:
    roles: [aut, fnd]
  Fanny Gautier:
    href: https://github.com/Fanny-Gautier
  Stefan Bundfuss:
    href: https://github.com/bundfussr
  Edoardo Mancini:
    href: https://manciniedoardo.github.io/
  Lina Patil:
    href: https://github.com/Lina2689
  Gerardo Jose Rodriguez:
    href: https://github.com/Gero1999
  Vladyslav Shuliar:
    href: https://github.com/vbshuliar
  Cytel Inc.:
    html: "<a href='https://www.cytel.com/'><img src='man/figures/cytel_logo.png' height='25' alt='Cytel logo' /></a>"
    href: https://www.cytel.com/
  F. Hoffmann-La Roche AG:
    html: "<a href='https://www.roche.com/'><img src='man/figures/roche_logo.png' height='32' alt='Roche logo' /></a>"
    href: https://www.roche.com/
  GlaxoSmithKline LLC:
    html: "<a href='https://www.gsk.com/'><img src='man/figures/gsk_logo.png' height='20' alt='GSK logo' /></a>"
    href: https://gsk.com/

navbar:
  structure:
    left: [reference, preview, news]
    right: [search, slack, history, newissue, github, lightswitch]
  components:
    reference:
       text: Reference
       href: reference/index.html
    preview:
       text: Explore ADaM Datasets
       href: articles/preview-adam.html
    slack:
      icon: fa-slack
      href: https://pharmaverse.slack.com/
      aria-label: Join the pharmaverse Slack!
    newissue:
      icon: fa-bug
      href: https://github.com/pharmaverse/pharmaverseadam/issues/new/choose
      aria-label: Report an issue

reference:
  - title: "Generic Datasets"
    contents:
      - has_keyword("generic")

  - title: "Metabolism Datasets"
    contents:
      - has_keyword("metabolic")

  - title: "Neurology Datasets"
    contents:
      - has_keyword("neurology")

  - title: "Oncology Datasets"
    contents:
      - has_keyword("oncology")

  - title: "Ophthalmology Datasets"
    contents:
      - has_keyword("ophthalmology")

  - title: "Pediatrics Datasets"
    contents:
      - has_keyword("pediatrics")

  - title: "Vaccine Datasets"
    contents:
      - has_keyword("vaccine")
